<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode — Iniciando tu espacio...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      gap: 24px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    h2 { font-size: 20px; font-weight: 600; color: #f1f5f9; }
    p { font-size: 14px; color: #64748b; }
    .dots::after {
      content: "";
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
    }
    a { color: #818cf8; font-size: 13px; text-decoration: none; margin-top: 8px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo-icon">⚡</div>
  <div style="text-align:center">
    <h2>Iniciando tu OpenCode<span class="dots"></span></h2>
    <p>Preparando tu espacio privado, esto toma unos segundos</p>
  </div>
  <a href="/logout">Cerrar sesión</a>

  <script>
    // Detectar si estamos en modo desarrollo local
    async function checkEnvironment() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        
        // Si estamos en modo local (SQLite), redirigir al dashboard local
        if (data.dbType === "sqlite") {
          window.location.href = "/dashboard-local";
          return;
        }
      } catch {}
      
      // En producción, intentar conectar a OpenCode
      checkReady();
    }

    // Redirige al proxy de OpenCode cuando esté listo
    async function checkReady() {
      try {
        const res = await fetch("/app/oc/", { redirect: "follow" });
        if (res.ok || res.status === 401) {
          window.location.href = "/app/oc/";
          return;
        }
      } catch {}
      setTimeout(checkReady, 1500);
    }

    // Espera 1s para que el servidor inicie el proceso, luego empieza a sondear
    setTimeout(checkEnvironment, 1000);
  </script>
</body>
</html>
