<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode — Crear cuenta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 20px; font-weight: 700; color: #f1f5f9; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #f1f5f9; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #64748b; }
    .footer a { color: #818cf8; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .hint { font-size: 11px; color: #475569; margin-top: -14px; margin-bottom: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">OpenCode</span>
    </div>
    <h1>Crear cuenta</h1>
    <p class="subtitle">Tu propio OpenCode, aislado y privado</p>

    <div class="error" id="error"></div>

    <form id="form">
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com" required autocomplete="email" />

      <label>Nombre de usuario</label>
      <input type="text" name="username" placeholder="mi_usuario" required autocomplete="username" />

      <label>Contraseña</label>
      <input type="password" name="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" />
      <p class="hint">Mínimo 8 caracteres</p>

      <button type="submit" id="btn">Crear cuenta</button>
    </form>

    <div class="footer">
      ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";
      errorEl.style.display = "none";

      const data = Object.fromEntries(new FormData(form));
      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.ok) {
          window.location.href = json.redirect;
        } else {
          errorEl.textContent = json.error;
          errorEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Crear cuenta";
        }
      } catch {
        errorEl.textContent = "Error de conexión. Intenta de nuevo.";
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Crear cuenta";
      }
    });
  </script>
</body>
</html>
